<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="hatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc1a1a"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b20000"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#5a0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hat brim -->
  <polygon points="20,95 100,75 180,95 160,100 100,85 40,100" fill="url(#hatGrad)" filter="url(#glow)"/>
  <!-- Hat crown left -->
  <polygon points="55,95 100,30 100,85" fill="#b20000"/>
  <!-- Hat crown right -->
  <polygon points="145,95 100,30 100,85" fill="#8b0000"/>
  <!-- Eye slit -->
  <path d="M60,108 Q80,100 100,108 Q120,100 140,108 Q120,115 100,105 Q80,115 60,108Z" fill="#000" opacity="0.9"/>
  <!-- Shield/face left -->
  <path d="M60,115 Q60,180 100,210 L100,115Z" fill="#b20000"/>
  <!-- Shield/face right -->
  <path d="M140,115 Q140,180 100,210 L100,115Z" fill="#8b0000"/>
  <!-- Center line highlight -->
  <line x1="100" y1="30" x2="100" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>
